<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naavo</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #E3E0D5;
            --surface: #FFFFFF;
            --green: #1C6645;
            --blue: #1B3D6E;
            --amber: #7A4A1E;
            --purple: #3D2278;
            --text: #0F0F0E;
            --text-2: #5C5C58;
            --border: #D5D2C7;
            --shadow: 0 4px 24px rgba(0,0,0,0.09);
            --shadow-hover: 0 12px 48px rgba(0,0,0,0.16);
        }

        html, body {
            height: 100%;
            background: var(--bg);
            font-family: 'Outfit', sans-serif;
            color: var(--text);
            overflow: hidden;
        }

        .app {
            height: 100vh;
            max-width: 420px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            padding: 48px 24px 36px;
        }

        /* ── Top bar ── */
        .topbar {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 44px;
            animation: up 0.5s cubic-bezier(0.22,1,0.36,1) both;
        }

        .greeting-eyebrow {
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-2);
            margin-bottom: 5px;
        }

        .greeting-name {
            font-family: 'Syne', sans-serif;
            font-size: 18px;
            font-weight: 700;
            line-height: 1.15;
            color: var(--text);
            letter-spacing: -0.3px;
        }
        .greeting-name em { font-style: normal; color: var(--green); }

        .profile-btn {
            width: 44px; height: 44px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--surface);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            box-shadow: 0 1px 8px rgba(0,0,0,0.07);
            flex-shrink: 0;
            transition: transform 0.18s, box-shadow 0.18s;
            -webkit-tap-highlight-color: transparent;
        }
        .profile-btn:hover { transform: scale(1.06); box-shadow: 0 4px 16px rgba(0,0,0,0.11); }
        .profile-btn:active { transform: scale(0.94); }

        /* ── Section label ── */
        .section-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1.4px;
            text-transform: uppercase;
            color: var(--text-2);
            margin-bottom: 12px;
            animation: up 0.5s cubic-bezier(0.22,1,0.36,1) 0.08s both;
        }

        /* ── Cards ── */
        .cards {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .card {
            border-radius: 20px;
            padding: 18px 22px;
            display: flex;
            align-items: center;
            gap: 16px;
            text-decoration: none;
            position: relative;
            overflow: hidden;
            transition: transform 0.22s cubic-bezier(0.22,1,0.36,1), box-shadow 0.22s ease;
            box-shadow: var(--shadow);
            -webkit-tap-highlight-color: transparent;
            opacity: 0;
            transform: translateY(30px);
            animation: cardUp 0.5s cubic-bezier(0.22,1,0.36,1) forwards;
        }
        .card:nth-child(1) { animation-delay: 0.15s; }
        .card:nth-child(2) { animation-delay: 0.25s; }
        .card:nth-child(3) { animation-delay: 0.35s; }
        .card:nth-child(4) { animation-delay: 0.45s; }
        .card:hover { transform: translateY(-3px) scale(1.01); box-shadow: var(--shadow-hover); }
        .card:active { transform: scale(0.97); box-shadow: var(--shadow); }

        .card-budget    { background: var(--green); }
        .card-portfolio { background: var(--blue); }
        .card-business  { background: var(--amber); }
        .card-insights  { background: var(--purple); }

        /* Geometric decoration */
        .card-deco {
            position: absolute;
            right: -28px; bottom: -28px;
            width: 95px; height: 95px;
            border-radius: 50%;
            border: 20px solid rgba(255,255,255,0.07);
            pointer-events: none;
        }
        .card-deco-2 {
            position: absolute;
            right: 44px; top: -18px;
            width: 54px; height: 54px;
            border-radius: 50%;
            border: 10px solid rgba(255,255,255,0.05);
            pointer-events: none;
        }

        .card-icon {
            width: 46px; height: 46px;
            border-radius: 13px;
            background: rgba(255,255,255,0.15);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        .card-body { flex: 1; }

        .card-title {
            font-family: 'Syne', sans-serif;
            font-size: 17px;
            font-weight: 700;
            color: white;
            margin-bottom: 3px;
            white-space: nowrap;
        }

        .card-desc {
            font-size: 11px;
            font-weight: 400;
            color: rgba(255,255,255,0.6);
            line-height: 1.4;
        }

        .card-arrow {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: transform 0.2s, background 0.2s;
        }
        .card:hover .card-arrow { background: rgba(255,255,255,0.25); transform: translateX(2px); }

        /* ── Footer ── */
        .footer {
            margin-top: auto;
            padding-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            animation: up 0.5s cubic-bezier(0.22,1,0.36,1) 0.22s both;
        }
        .footer-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--text-2); opacity: 0.4; }
        .footer-text { font-size: 11px; font-weight: 400; color: var(--text-2); opacity: 0.7; }

        @keyframes cardUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes up {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (min-width: 900px) {
            body { background: #D8D5CA; }
            .app {
                background: var(--bg);
                border-radius: 40px;
                box-shadow: 0 32px 100px rgba(0,0,0,0.14);
                margin: 24px auto;
                height: calc(100vh - 48px);
            }
        }

        @media (max-width: 380px) {
            .app { padding: 40px 18px 28px; }
            .card { padding: 18px 16px; }
            .card-title { font-size: 15px; }
            .greeting-name { font-size: 19px; }
        }
    </style>
</head>
<body>
    <div class="app">

        <!-- Top bar -->
        <div class="topbar">
            <div>
                <div class="greeting-eyebrow" id="greeting">Good morning 👋</div>
                <div class="greeting-name">Welcome back, <em>Mega</em></div>
            </div>
            <button class="profile-btn" onclick="alert('Profile coming soon')">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                    <circle cx="9" cy="6.5" r="3" stroke="#1C6645" stroke-width="1.6" fill="none"/>
                    <path d="M2.5 15.5c0-3.038 2.91-5.5 6.5-5.5s6.5 2.462 6.5 5.5" stroke="#1C6645" stroke-width="1.6" stroke-linecap="round" fill="none"/>
                </svg>
            </button>
        </div>

        <!-- Section label -->
        <div class="section-label">What would you like to manage?</div>

        <!-- Cards -->
        <div class="cards">

            <a class="card card-budget" href="index.html">
                <div class="card-deco"></div>
                <div class="card-deco-2"></div>
                <div class="card-icon">
                    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
                        <rect x="1.5" y="5.5" width="19" height="13" rx="2.5" stroke="white" stroke-width="1.6"/>
                        <path d="M1.5 9.5H20.5" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
                        <rect x="13.5" y="12" width="5" height="3.5" rx="1.75" stroke="white" stroke-width="1.3" fill="rgba(255,255,255,0.2)"/>
                        <path d="M5.5 3C5.5 2.17 6.17 1.5 7 1.5H15C15.83 1.5 16.5 2.17 16.5 3V5.5H5.5V3Z" stroke="white" stroke-width="1.4"/>
                    </svg>
                </div>
                <div class="card-body">
                    <div class="card-title">Vault</div>
                    <div class="card-desc">Income, expenses, bills & debts</div>
                </div>
                <div class="card-arrow">
                    <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                        <path d="M2.5 6.5H10.5M10.5 6.5L7 3M10.5 6.5L7 10" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
            </a>

            <a class="card card-portfolio" href="portfolio.html">
                <div class="card-deco"></div>
                <div class="card-deco-2"></div>
                <div class="card-icon">
                    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
                        <path d="M2 18H20" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
                        <path d="M3.5 15.5L8 9.5L12 12.5L17.5 5" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                        <circle cx="17.5" cy="5" r="2" fill="rgba(255,255,255,0.3)" stroke="white" stroke-width="1.3"/>
                        <path d="M15.5 5L17.5 3L19.5 5" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <div class="card-body">
                    <div class="card-title">Portfolio</div>
                    <div class="card-desc">Investments, crypto & net worth</div>
                </div>
                <div class="card-arrow">
                    <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                        <path d="M2.5 6.5H10.5M10.5 6.5L7 3M10.5 6.5L7 10" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
            </a>

            <a class="card card-business" href="business.html">
                <div class="card-deco"></div>
                <div class="card-deco-2"></div>
                <div class="card-icon">
                    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
                        <path d="M2 19H20" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
                        <rect x="3" y="11" width="4" height="8" rx="1" fill="rgba(255,255,255,0.3)" stroke="white" stroke-width="1.4"/>
                        <rect x="9" y="6" width="4" height="13" rx="1" fill="rgba(255,255,255,0.3)" stroke="white" stroke-width="1.4"/>
                        <rect x="15" y="3" width="4" height="16" rx="1" fill="rgba(255,255,255,0.3)" stroke="white" stroke-width="1.4"/>
                    </svg>
                </div>
                <div class="card-body">
                    <div class="card-title">Business</div>
                    <div class="card-desc">Revenue, expenses & profit/loss</div>
                </div>
                <div class="card-arrow">
                    <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                        <path d="M2.5 6.5H10.5M10.5 6.5L7 3M10.5 6.5L7 10" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
            </a>

            <a class="card card-insights" href="ai.html">
                <div class="card-deco"></div>
                <div class="card-deco-2"></div>
                <div class="card-icon">
                    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
                        <!-- Brain outline -->
                        <path d="M8 19v-1.5a3.5 3.5 0 0 1-3.5-3.5A3.5 3.5 0 0 1 3 11a3.5 3.5 0 0 1 1.5-2.9A3.5 3.5 0 0 1 8 4.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                        <path d="M14 19v-1.5a3.5 3.5 0 0 0 3.5-3.5A3.5 3.5 0 0 0 19 11a3.5 3.5 0 0 0-1.5-2.9A3.5 3.5 0 0 0 14 4.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                        <path d="M8 4.5C8 3.12 9.12 2 10.5 2h1C12.88 2 14 3.12 14 4.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                        <!-- Neural lines -->
                        <path d="M11 7v8" stroke="white" stroke-width="1.3" stroke-linecap="round" opacity="0.6"/>
                        <path d="M8.5 9.5L13.5 12.5" stroke="white" stroke-width="1.3" stroke-linecap="round" opacity="0.6"/>
                        <path d="M13.5 9.5L8.5 12.5" stroke="white" stroke-width="1.3" stroke-linecap="round" opacity="0.6"/>
                        <circle cx="11" cy="7" r="1" fill="white"/>
                        <circle cx="11" cy="15" r="1" fill="white"/>
                        <circle cx="8.5" cy="9.5" r="1" fill="white"/>
                        <circle cx="13.5" cy="12.5" r="1" fill="white"/>
                        <circle cx="13.5" cy="9.5" r="1" fill="white"/>
                        <circle cx="8.5" cy="12.5" r="1" fill="white"/>
                    </svg>
                </div>
                <div class="card-body">
                    <div class="card-title">Naavo AI</div>
                    <div class="card-desc">AI insights, net worth & smart advice</div>
                </div>
                <div class="card-arrow">
                    <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                        <path d="M2.5 6.5H10.5M10.5 6.5L7 3M10.5 6.5L7 10" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
            </a>

        </div>

        <!-- Footer -->
        <div class="footer">
            <span class="footer-text">Private</span>
            <div class="footer-dot"></div>
            <span class="footer-text">Secure login</span>
            <div class="footer-dot"></div>
            <span class="footer-text">Works offline</span>
        </div>

    </div>

    <script>
        const h = new Date().getHours();
        document.getElementById('greeting').textContent =
            h < 12 ? 'Good morning 👋' :
            h < 17 ? 'Good afternoon 👋' :
            h < 21 ? 'Good evening 👋' : 'Good night 👋';
    </script>
</body>
</html>
